<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dark Matter{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: {{ bg_color|default('white') }};
            --surface: #ffffff;
            --text: #1a1a2e;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,.08);
            --shadow-lg: 0 10px 40px -10px rgba(0,0,0,.15);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            line-height: 1.6;
        }
        .app {
            max-width: 56rem;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .header .user { font-weight: 600; color: var(--text); }
        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: background .15s, color .15s;
        }
        .btn-ghost { background: transparent; color: var(--text-muted); }
        .btn-ghost:hover { background: var(--border); color: var(--text); }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover { background: var(--accent-hover); color: white; }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
        }
        .from-page {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
        h1 { font-size: 1.75rem; font-weight: 700; margin: 0 0 0.5rem 0; }
        h2 { font-size: 1.25rem; font-weight: 600; margin: 0 0 1rem 0; color: var(--text); }
        a { color: var(--accent); text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }
        /* Compass nav: only shown when user is logged in */
        .compass-wrap {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }
        .compass {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            grid-template-rows: auto auto auto;
            gap: 0.5rem 1rem;
            max-width: 16rem;
            margin: 0 auto;
            place-items: center;
        }
        .compass .up { grid-column: 2; grid-row: 1; }
        .compass .down { grid-column: 2; grid-row: 3; }
        .compass .left { grid-column: 1; grid-row: 2; }
        .compass .right { grid-column: 3; grid-row: 2; }
        .compass .center { grid-column: 2; grid-row: 2; color: var(--text-muted); font-size: 1.25rem; }
        .compass a {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-weight: 500;
            transition: background .15s, transform .05s;
        }
        .compass a:hover { background: var(--accent-hover); text-decoration: none; }
        .compass .disabled {
            color: var(--text-muted);
            cursor: default;
            font-weight: 500;
            padding: 0.5rem 1rem;
        }
        .nav-about { margin-bottom: 1rem; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app">
        {% block body %}{% endblock %}
    </div>
</body>
</html>
