<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<section layout:fragment="content">
    <p class="from-page" th:if="${fromPage != null}">You came from: <span th:text="${fromPage}"></span></p>
    <div class="card">
        <h2 th:text="${pageHeading}">Upper Right</h2>
        <div th:replace="~{fragments/compass :: compass}"></div>
    </div>
</section>
</body>
</html>
